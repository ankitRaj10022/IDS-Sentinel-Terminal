name: Release IDS Sentinel Terminal

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python package and portable archives
        run: |
          python -m pip install --upgrade pip build twine
          python scripts/build_python_package.py
          python -m twine check dist/ids_sentinel_terminal-*.whl dist/ids_sentinel_terminal-*.tar.gz
          python scripts/build_distributions.py

      - name: Smoke-test built wheel
        run: |
          python -m pip install dist/*.whl
          mkdir -p /tmp/ids-sentinel-release-test
          cd /tmp/ids-sentinel-release-test
          ids-sentinel --version
          ids-sentinel status --json >/tmp/ids-sentinel-release-status.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Attach artifacts to GitHub release
        if: ${{ github.event_name == 'release' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber

      - name: Create GitHub release from tag
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "IDS Sentinel Terminal ${GITHUB_REF_NAME}" \
            --notes "Download the Windows ZIP, Linux tarball, macOS tarball, or wheel below. These are tool-only artifacts; users do not need to clone the repository."

  pypi-publish:
    if: ${{ github.event_name == 'release' && vars.PUBLISH_TO_PYPI == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - release-build

    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-dists
          path: dist/

      - name: Publish wheel and sdist to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
